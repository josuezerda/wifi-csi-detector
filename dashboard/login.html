<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spectra — Acceso al Sistema</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0e14;
            color: #c9d1d9;
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated background */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 0 24px;
        }

        .login-card {
            background: rgba(22, 27, 34, 0.8);
            border: 1px solid rgba(48, 54, 61, 0.6);
            border-radius: 16px;
            padding: 48px 40px;
            backdrop-filter: blur(20px);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 8px;
        }

        .login-logo h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00e5ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .login-subtitle {
            text-align: center;
            font-size: 0.8rem;
            color: #484f58;
            margin-bottom: 36px;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.05em;
        }

        .login-label {
            display: block;
            font-size: 0.75rem;
            color: #8b949e;
            margin-bottom: 8px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .login-input-wrap {
            position: relative;
            margin-bottom: 24px;
        }

        .login-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(13, 17, 23, 0.8);
            border: 1px solid #30363d;
            border-radius: 10px;
            color: #f0f6fc;
            font-size: 0.95rem;
            font-family: 'JetBrains Mono', monospace;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .login-input:focus {
            border-color: #00e5ff;
            box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.1);
        }

        .login-input::placeholder {
            color: #30363d;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00e5ff, #7c3aed);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.02em;
        }

        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 30px rgba(0, 229, 255, 0.2);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-error {
            text-align: center;
            color: #f85149;
            font-size: 0.8rem;
            margin-top: 16px;
            min-height: 20px;
            transition: opacity 0.2s;
        }

        .login-back {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: #484f58;
            font-size: 0.8rem;
            text-decoration: none;
            transition: color 0.2s;
        }

        .login-back:hover { color: #8b949e; }

        .security-note {
            text-align: center;
            margin-top: 20px;
            font-size: 0.7rem;
            color: #30363d;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .lock-icon {
            width: 12px;
            height: 12px;
            stroke: #30363d;
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <h1>Spectra</h1>
            </div>
            <p class="login-subtitle">Acceso al sistema de monitoreo</p>

            <form id="login-form" autocomplete="off">
                <label class="login-label" for="email">Usuario</label>
                <div class="login-input-wrap">
                    <input
                        type="email"
                        id="email"
                        class="login-input"
                        placeholder="superadmin@spectra.com"
                        autofocus
                        required
                    >
                </div>
                <label class="login-label" for="password">Contraseña</label>
                <div class="login-input-wrap">
                    <input
                        type="password"
                        id="password"
                        class="login-input"
                        placeholder="Ingresá la contraseña"
                        required
                    >
                </div>
                <button type="submit" class="login-btn">Acceder al Sistema</button>
                <div class="login-error" id="login-error"></div>
            </form>

            <a href="index.html" class="login-back">← Volver al inicio</a>

            <div class="security-note">
                <svg class="lock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                Conexión local — sin datos en la nube
            </div>
        </div>
    </div>

    <script>
    // Background animation
    (function() {
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // Floating particles
        const particles = Array.from({ length: 40 }, () => ({
            x: Math.random() * window.innerWidth,
            y: Math.random() * window.innerHeight,
            vx: (Math.random() - 0.5) * 0.3,
            vy: (Math.random() - 0.5) * 0.3,
            r: 1 + Math.random() * 2,
            alpha: 0.1 + Math.random() * 0.2,
        }));

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw connections between nearby particles
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 150) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(0, 229, 255, ${0.05 * (1 - dist / 150)})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }

            // Draw and update particles
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 229, 255, ${p.alpha})`;
                ctx.fill();
            });

            requestAnimationFrame(draw);
        }
        requestAnimationFrame(draw);
    })();

    // Supabase SDK
    const SUPABASE_URL = 'https://yqzbdovolgrmjiklrevc.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_pbpoD_mT-6sZV3B3hAYE8g_Ljhw-7KZ';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Check if already logged in
    (async () => {
        const { data: { session } } = await _supabase.auth.getSession();
        if (session) {
            window.location.href = 'dashboard.html';
        }
    })();

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button[type="submit"]');
        const err = document.getElementById('login-error');
        const email = document.getElementById('email').value.trim().toLowerCase();
        const pass = document.getElementById('password').value;

        btn.textContent = 'Conectando...';
        btn.disabled = true;
        err.textContent = '';

        const { data, error } = await _supabase.auth.signInWithPassword({
            email: email,
            password: pass,
        });

        if (error) {
            err.textContent = 'Credenciales incorrectas';
            btn.textContent = 'Acceder al Sistema';
            btn.disabled = false;
            document.getElementById('password').value = '';
            document.getElementById('password').focus();
            setTimeout(() => { err.textContent = ''; }, 3000);
        } else {
            // Also set legacy flag for backward compat
            sessionStorage.setItem('spectra_auth', 'true');
            sessionStorage.setItem('spectra_user', email);
            window.location.href = 'dashboard.html';
        }
    });
    </script>
</body>
</html>
