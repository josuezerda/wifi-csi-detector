<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wifi-csi-detector — terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0d1117;
            color: #c9d1d9;
            font-family: 'JetBrains Mono', 'Menlo', 'Consolas', monospace;
            font-size: 12px;
            line-height: 1.5;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Terminal window chrome */
        .terminal-chrome {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 32px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 8px;
            z-index: 10;
            -webkit-app-region: drag;
        }

        .chrome-dot { width: 12px; height: 12px; border-radius: 50%; }
        .chrome-dot.r { background: #ff5f57; }
        .chrome-dot.y { background: #febc2e; }
        .chrome-dot.g { background: #28c840; }

        .chrome-title {
            flex: 1;
            text-align: center;
            font-size: 11px;
            color: #8b949e;
            letter-spacing: 0.02em;
        }

        /* Main terminal area */
        .terminal {
            position: fixed;
            top: 32px; left: 0; right: 0; bottom: 0;
            padding: 8px 12px;
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* Line styles */
        .line {
            white-space: pre-wrap;
            word-break: break-all;
            min-height: 18px;
        }

        .line.new { animation: fadeIn 0.1s ease-out; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Colors matching real terminal */
        .prompt { color: #7ee787; font-weight: 500; }
        .path { color: #79c0ff; }
        .cmd { color: #f0f6fc; font-weight: 500; }
        .flag { color: #d2a8ff; }
        .str { color: #a5d6ff; }
        .num { color: #ffa657; }
        .comment { color: #484f58; font-style: italic; }
        .err { color: #f85149; }
        .warn { color: #d29922; }
        .ok { color: #3fb950; }
        .dim { color: #484f58; }
        .cyan { color: #39d353; }
        .blue { color: #58a6ff; }
        .key { color: #ff7b72; }
        .bracket { color: #8b949e; }
        .time { color: #484f58; }
        .bold { font-weight: 600; }
        .separator { color: #30363d; }

        /* Cursor blink */
        .cursor {
            display: inline-block;
            width: 7px;
            height: 14px;
            background: #c9d1d9;
            animation: cursorBlink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 2px;
        }

        @keyframes cursorBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0d1117; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #484f58; }

        /* Status bar */
        .status-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 22px;
            background: #161b22;
            border-top: 1px solid #30363d;
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 16px;
            font-size: 10px;
            color: #484f58;
            z-index: 10;
        }

        .status-item { display: flex; align-items: center; gap: 4px; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; }
        .status-dot.live { background: #3fb950; box-shadow: 0 0 4px #3fb950; }
        .status-dot.warn { background: #d29922; }
    </style>
</head>
<body>
    <div class="terminal-chrome">
        <div class="chrome-dot r"></div>
        <div class="chrome-dot y"></div>
        <div class="chrome-dot g"></div>
        <span class="chrome-title">pi@raspberrypi: ~/wifi-csi-detector</span>
    </div>

    <div class="terminal" id="terminal"></div>

    <div class="status-bar">
        <div class="status-item"><div class="status-dot live"></div> LIVE</div>
        <div class="status-item" id="sb-frames">frames: 0</div>
        <div class="status-item" id="sb-fps">10 fps</div>
        <div class="status-item" id="sb-variance">σ²: 0.00</div>
        <div class="status-item" id="sb-status">idle</div>
        <div class="status-item" style="margin-left:auto" id="sb-uptime">0:00</div>
    </div>

    <script>
    const term = document.getElementById('terminal');
    let lineCount = 0;

    function addLine(html, cls = '') {
        const div = document.createElement('div');
        div.className = 'line new';
        if (cls) div.className += ' ' + cls;
        div.innerHTML = html;
        term.appendChild(div);
        lineCount++;
        if (lineCount > 500) term.removeChild(term.firstChild);
        term.scrollTop = term.scrollHeight;
    }

    function addLines(arr) { arr.forEach(l => addLine(l)); }

    function ts() {
        return new Date().toLocaleTimeString('en-GB', { hour12: false });
    }

    function prompt() {
        return `<span class="prompt">pi@raspberrypi</span><span class="dim">:</span><span class="path">~/wifi-csi-detector</span><span class="dim">$</span> `;
    }

    // ═══ Boot Sequence ═══
    async function bootSequence() {
        addLine(prompt() + `<span class="cmd">sudo</span> <span class="flag">systemctl</span> start wifi-csi-detector.service`);
        await delay(400);
        addLine(`<span class="dim">● wifi-csi-detector.service - WiFi CSI Presence Detector</span>`);
        addLine(`<span class="dim">     Loaded: loaded (/etc/systemd/system/wifi-csi-detector.service; enabled)</span>`);
        addLine(`<span class="dim">     Active: </span><span class="ok">active (running)</span><span class="dim"> since ${new Date().toUTCString()}</span>`);
        addLine(`<span class="dim">   Main PID: ${1200 + Math.floor(Math.random()*800)} (python3)</span>`);
        addLine('');
        await delay(300);

        addLine(prompt() + `<span class="cmd">python3</span> <span class="str">server.py</span> <span class="flag">--port</span> <span class="num">8765</span> <span class="flag">--serial</span> <span class="str">/dev/ttyUSB0</span> <span class="flag">--baud</span> <span class="num">921600</span>`);
        await delay(600);

        addLines([
            `<span class="dim">[${ts()}]</span> <span class="blue">INFO</span>  Loading configuration from <span class="str">config.yaml</span>`,
            `<span class="dim">[${ts()}]</span> <span class="blue">INFO</span>  Serial port: <span class="str">/dev/ttyUSB0</span> @ <span class="num">921600</span> baud`,
            `<span class="dim">[${ts()}]</span> <span class="blue">INFO</span>  Detection threshold: <span class="num">12.0</span> | Sensitivity: <span class="num">0.70</span>`,
            `<span class="dim">[${ts()}]</span> <span class="blue">INFO</span>  Window size: <span class="num">50</span> frames | Subcarriers: <span class="num">64</span>`,
        ]);
        await delay(200);

        addLines([
            `<span class="dim">[${ts()}]</span> <span class="blue">INFO</span>  Opening serial connection...`,
            `<span class="dim">[${ts()}]</span> <span class="ok">OK</span>    Serial connected to ESP32 (chip: ESP32-D0WD-V3)`,
            `<span class="dim">[${ts()}]</span> <span class="blue">INFO</span>  Firmware: esp-csi v1.0.4 | MAC: <span class="num">3C:61:05:${Math.floor(Math.random()*0xFF).toString(16).padStart(2,'0')}:${Math.floor(Math.random()*0xFF).toString(16).padStart(2,'0')}:${Math.floor(Math.random()*0xFF).toString(16).padStart(2,'0')}</span>`,
        ]);
        await delay(300);

        addLines([
            `<span class="dim">[${ts()}]</span> <span class="blue">INFO</span>  Starting WebSocket server on <span class="str">ws://0.0.0.0:8765</span>`,
            `<span class="dim">[${ts()}]</span> <span class="ok">OK</span>    WebSocket server ready — waiting for clients`,
            `<span class="dim">[${ts()}]</span> <span class="blue">INFO</span>  Starting CSI data collection...`,
        ]);
        await delay(400);

        addLine('');
        addLine(`<span class="separator">${'─'.repeat(72)}</span>`);
        addLine(`<span class="dim">[${ts()}]</span> <span class="ok">▶ LIVE</span>  CSI stream active — processing frames`);
        addLine(`<span class="separator">${'─'.repeat(72)}</span>`);
        addLine('');
        await delay(200);

        startDataStream();
    }

    // ═══ Simulator ═══
    class Sim {
        constructor() {
            this.n = 64; this.t = 0; this.state = 'empty'; this.si = 0;
            this.states = ['empty','entering','moving','still','breathing','leaving'];
            this.stateT = Date.now(); this.dur = 6000 + Math.random()*6000;
            this.base = Array.from({length:64}, (_,i) => 20+8*Math.exp(-2*((i/64*2-1)**2))+(Math.random()-0.5)*3);
            this.history = []; this.variance = 0; this.detCount = 0; this.frames = 0;
            this.start = Date.now(); this.lastP = false;
        }
        g() { return Math.sqrt(-2*Math.log(Math.random()))*Math.cos(2*Math.PI*Math.random()); }
        tick() {
            this.t++; this.frames++;
            if (Date.now()-this.stateT > this.dur) {
                this.si = (this.si+1) % this.states.length;
                this.state = this.states[this.si]; this.stateT = Date.now();
                this.dur = 3000 + Math.random()*8000;
            }
            const p = Math.min(1,(Date.now()-this.stateT)/this.dur);
            const amps = this.base.map((b,i) => {
                let pt = 0; const c=32, d=(i-c)/10;
                if (this.state==='entering') pt = 6*p*Math.exp(-0.5*d*d);
                else if (this.state==='moving') pt = 6*(0.8+0.2*Math.sin(this.t*0.3))*Math.exp(-0.5*((i-c+(Math.random()-0.5)*10)/10)**2)+this.g()*3;
                else if (this.state==='still') pt = 3*Math.exp(-0.5*d*d)+this.g()*0.8;
                else if (this.state==='breathing') pt = 2.5*Math.exp(-0.5*d*d)+2.5*Math.sin(this.t*0.2)*Math.exp(-0.5*(d/1.5)**2);
                else if (this.state==='leaving') pt = 3*(1-p)*Math.exp(-0.5*d*d);
                return Math.max(1,Math.min(50,b+this.g()*1.2+pt));
            });
            this.history.push(amps); if (this.history.length>50) this.history.shift();
            if (this.history.length>3) {
                let v=0;
                for(let s=0;s<64;s++){let sm=0,sq=0;this.history.forEach(r=>{sm+=r[s];sq+=r[s]*r[s]});const n=this.history.length;v+=sq/n-(sm/n)**2;}
                this.variance = 0.3*(v/64)+0.7*this.variance;
            }
            const presence = this.variance > 9.6;
            const movement = this.variance > 20;
            if (presence && !this.lastP) this.detCount++;
            this.lastP = presence;
            return { amps, variance: this.variance, presence, movement, state: this.state,
                rssi: Math.round(-55+(presence?-5:0)+this.g()*2), frames: this.frames, detections: this.detCount,
                uptime: (Date.now()-this.start)/1000, avgAmp: amps.reduce((a,b)=>a+b,0)/64 };
        }
    }

    const sim = new Sim();
    let fpsCount = 0, fps = 0;
    setInterval(() => { fps = fpsCount; fpsCount = 0; }, 1000);

    // ═══ Data Stream ═══
    let lastPresenceState = false;
    let lastMovementState = false;

    function startDataStream() {
        setInterval(() => {
            const d = sim.tick();
            fpsCount++;
            outputFrame(d);
            updateStatusBar(d);
        }, 100);
    }

    function outputFrame(d) {
        const t = ts();
        const ampPreview = d.amps.slice(0, 6).map(a => a.toFixed(1)).join(', ');

        // Raw CSI line (like real ESP32 serial output)
        if (d.frames % 5 === 0) {
            const rawLine = `CSI_DATA,${d.frames},${Date.now()},${d.rssi},-95,6,0,1,${d.amps.length},0,0,[${d.amps.map(a=>Math.round(a)).join(',')}]`;
            addLine(`<span class="dim">${rawLine.substring(0, 120)}...</span>`);
        }

        // Processing output
        const vColor = d.variance > 20 ? 'err' : d.variance > 9.6 ? 'warn' : 'ok';
        addLine(
            `<span class="time">[${t}]</span> ` +
            `<span class="dim">frame</span> <span class="num">${String(d.frames).padStart(5)}</span> ` +
            `<span class="dim">│</span> rssi <span class="num">${String(d.rssi).padStart(3)}</span> ` +
            `<span class="dim">│</span> σ² <span class="${vColor}">${d.variance.toFixed(2).padStart(6)}</span> ` +
            `<span class="dim">│</span> avg <span class="num">${d.avgAmp.toFixed(1).padStart(5)}</span> ` +
            `<span class="dim">│</span> <span class="${vColor}">${d.movement ? 'MOVEMENT' : d.presence ? 'PRESENCE' : '--------'}</span>`
        );

        // Detection state changes
        if (d.presence && !lastPresenceState) {
            addLine('');
            addLine(`<span class="time">[${t}]</span> <span class="err bold">▲ PRESENCE DETECTED</span>  <span class="dim">variance=${d.variance.toFixed(2)} threshold=9.60 confidence=${(Math.min(d.variance/9.6, 3)*33).toFixed(0)}%</span>`);
            addLine(`<span class="time">[${t}]</span> <span class="dim">  trigger: subcarrier amplitude deviation exceeds baseline by ${(d.variance - 9.6).toFixed(1)}σ</span>`);
            addLine('');
        }
        if (!d.presence && lastPresenceState) {
            addLine('');
            addLine(`<span class="time">[${t}]</span> <span class="ok bold">▼ PRESENCE CLEARED</span>   <span class="dim">variance=${d.variance.toFixed(2)} — returning to baseline</span>`);
            addLine('');
        }
        if (d.movement && !lastMovementState) {
            addLine(`<span class="time">[${t}]</span> <span class="warn bold">⚡ ACTIVE MOVEMENT</span>  <span class="dim">variance=${d.variance.toFixed(2)} exceeds movement threshold (20.0)</span>`);
        }

        lastPresenceState = d.presence;
        lastMovementState = d.movement;

        // Periodic stats
        if (d.frames % 50 === 0) {
            addLine('');
            addLine(`<span class="separator">${'─'.repeat(72)}</span>`);
            const upM = Math.floor(d.uptime/60), upS = Math.floor(d.uptime%60);
            addLine(
                `<span class="time">[${t}]</span> <span class="blue">STATS</span> ` +
                `uptime=<span class="num">${upM}:${String(upS).padStart(2,'0')}</span> ` +
                `frames=<span class="num">${d.frames}</span> ` +
                `detections=<span class="num">${d.detections}</span> ` +
                `fps=<span class="num">${fps}</span> ` +
                `mem=<span class="num">${(32 + d.frames * 0.02).toFixed(1)}MB</span>`
            );
            addLine(`<span class="separator">${'─'.repeat(72)}</span>`);
            addLine('');
        }

        // Occasional system messages
        if (d.frames % 100 === 0 && d.frames > 0) {
            const msgs = [
                `<span class="time">[${t}]</span> <span class="blue">INFO</span>  Baseline recalibrated — noise_floor=<span class="num">-95.${Math.floor(Math.random()*9)}</span> dBm`,
                `<span class="time">[${t}]</span> <span class="blue">INFO</span>  WebSocket client connected from <span class="num">192.168.1.${Math.floor(Math.random()*50+100)}</span>`,
                `<span class="time">[${t}]</span> <span class="blue">INFO</span>  Buffer flush — wrote <span class="num">${d.frames}</span> frames to <span class="str">data/csi_log_${new Date().toISOString().slice(0,10)}.csv</span>`,
                `<span class="time">[${t}]</span> <span class="dim">DEBUG</span> Serial RX: <span class="num">${(900+Math.floor(Math.random()*100))}</span> bytes/s | dropped: <span class="num">0</span>`,
            ];
            addLine(msgs[Math.floor(Math.random() * msgs.length)]);
        }
    }

    function updateStatusBar(d) {
        document.getElementById('sb-frames').textContent = `frames: ${d.frames}`;
        document.getElementById('sb-fps').textContent = `${fps} fps`;
        document.getElementById('sb-variance').textContent = `σ²: ${d.variance.toFixed(2)}`;
        document.getElementById('sb-status').innerHTML = d.movement
            ? '<span style="color:#d29922">MOVEMENT</span>'
            : d.presence
            ? '<span style="color:#f85149">PRESENCE</span>'
            : '<span style="color:#3fb950">clear</span>';
        const m = Math.floor(d.uptime/60), s = Math.floor(d.uptime%60);
        document.getElementById('sb-uptime').textContent = `${m}:${String(s).padStart(2,'0')}`;
    }

    function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

    // Start
    bootSequence();
    </script>
</body>
</html>
